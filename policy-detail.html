<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政策详情 - 六点半物流资讯</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .policy-detail-container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; margin-bottom: 20px; transition: background 0.3s; }
        .back-btn:hover { background: #5a6fd6; }
        .policy-detail { background: white; border-radius: 12px; padding: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .policy-detail h1 { font-size: 1.8rem; color: #333; margin-bottom: 20px; line-height: 1.4; }
        .policy-meta { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #eee; color: #666; font-size: 0.95rem; }
        .policy-content { font-size: 1.05rem; line-height: 1.9; color: #444; }
        .policy-content p { margin-bottom: 15px; }
        .policy-tags { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; flex-wrap: wrap; }
        .policy-tag { display: inline-block; padding: 6px 16px; background: #f0f0ff; color: #667eea; border-radius: 20px; font-size: 0.9rem; }
        .related-policies { margin-top: 40px; background: #f8f9fa; border-radius: 12px; padding: 25px; }
        .related-policies h3 { font-size: 1.2rem; color: #333; margin-bottom: 15px; }
        .related-list { display: flex; flex-direction: column; gap: 10px; }
        .related-item { padding: 12px; background: white; border-radius: 8px; cursor: pointer; transition: all 0.3s; border-left: 3px solid #667eea; }
        .related-item:hover { background: #f0f0ff; }
        .related-item h4 { font-size: 0.95rem; color: #333; margin-bottom: 5px; }
        .related-item p { font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo"><h1><a href="index.html">六点半物流资讯</a></h1></div>
            <nav class="nav">
                <ul>
                    <li><a href="index.html">首页</a></li>
                    <li><a href="category.html?cat=快递">快递</a></li>
                    <li><a href="category.html?cat=仓储">仓储</a></li>
                    <li><a href="category.html?cat=运输">运输</a></li>
                    <li><a href="category.html?cat=供应链">供应链</a></li>
                    <li><a href="policy.html">政策法规汇编</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container policy-detail-container">
            <a href="policy.html" class="back-btn">&larr; 返回政策列表</a>
            <div class="policy-detail" id="policyDetail"></div>
            <div class="related-policies" id="relatedPolicies">
                <h3>相关政策</h3>
                <div class="related-list" id="relatedList"></div>
            </div>
        </div>
    </main>

    <script>
    var policies = [];
    policies.push({id:'policy-001',title:'十四五现代物流发展规划',agency:'国家发展改革委',date:'2022-12-15',category:'综合物流规划',summary:'构建通道+枢纽+网络现代物流运行体系，建设212个国家物流枢纽',content:'国务院办公厅关于印发十四五现代物流发展规划的通知。规划提出，到2025年，基本建成供需适配、内外联通、安全高效、智慧绿色的现代物流体系。社会物流总费用与国内生产总值的比率稳中有降，物流运行效率明显提升。建设212个国家物流枢纽，基本形成国家物流枢纽网络。构建通道+枢纽+网络现代物流运行体系，完善县乡村三级物流服务设施体系。',tags:['物流规划','国家物流枢纽','十四五']});
    policies.push({id:'policy-002',title:'有效降低全社会物流成本行动方案',agency:'中共中央办公厅、国务院办公厅',date:'2024-11-01',category:'综合物流规划',summary:'深化物流领域放管服改革，降低物流制度性交易成本',content:'方案提出，深化物流领域放管服改革，降低物流制度性交易成本。推进物流基础设施网络建设，优化运输结构，推进多式联运发展。加强物流领域信用体系建设，完善物流市场监管体制。推动物流业与制造业深度融合，促进供应链创新发展。',tags:['降本增效','物流改革']});
    policies.push({id:'policy-003',title:'十四五冷链物流发展规划',agency:'国家发展改革委',date:'2021-12-01',category:'冷链物流',summary:'布局建设100个左右国家骨干冷链物流基地',content:'规划提出，到2025年，布局建设100个左右国家骨干冷链物流基地。肉类、果蔬、水产品产地低温处理率分别达到85%、30%、85%。构建三级节点、两大系统、一体化网络的冷链物流运行体系。加强冷链物流基础设施建设，完善冷链物流服务体系。',tags:['冷链物流','冷链基地','十四五']});
    policies.push({id:'policy-004',title:'物流企业冷链服务能力要求与评估指标GB/T 31086-2025',agency:'国家市场监管总局',date:'2025-06-01',category:'冷链物流',summary:'修订冷链服务能力评估指标，新增营业时间、冷链物流收入等指标',content:'本标准规定了物流企业冷链服务能力的基本要求、评估指标和评估方法。修订内容包括：新增营业时间、冷链物流收入等指标；强调可持续发展，将节能制度改为节能要求；新增满意度调查覆盖率指标，提升服务精细化水平。适用于从事冷链物流服务的企业能力评估。',tags:['冷链标准','服务评估','国标']});
    policies.push({id:'policy-005',title:'ISO/TS 31514:2025冷链物流中食品可追溯性的要求和建议',agency:'国际标准化组织ISO',date:'2025-11-04',category:'冷链物流',summary:'建立冷链物流中食品可追溯性系统的统一框架',content:'该国际标准由我国牵头制定，建立了冷链物流中食品可追溯性系统的统一框架。覆盖运输、仓储、装卸搬运等关键环节，实现全程追溯。为出口型企业提供了国际标准参考，提升了我国冷链物流在国际上的话语权。',tags:['食品追溯','国际标准','冷链物流']});
    policies.push({id:'policy-006',title:'关于开展物流数据开放互联试点工作的通知',agency:'国家发展改革委、国家数据局等8部门',date:'2025-02-07',category:'数字化转型',summary:'选取16个城市开展物流数据开放互联试点',content:'通知要求选取16个城市开展试点，包括天津、唐山、宁波、金华等。重点任务包括：多式联运数据开放互联、制造业与物流业数据融合、国际物流数据综合服务、国家物流枢纽间数据互联共享。打通海关、港口、铁路、公路、水运、航空等多域数据。',tags:['数据互联','数字化','试点']});
    policies.push({id:'policy-007',title:'关于推动物流数据开放互联有效降低全社会物流成本的实施方案',agency:'国家发展改革委、国家数据局等10部门',date:'2025-11-03',category:'数字化转型',summary:'建立国家物流公共数据共享开放清单',content:'方案提出，建立国家物流公共数据共享开放清单，加强企业资质、从业人员、车船注册、通关物流等数据归集共享。推动企业物流数据市场化流通利用，共建可信数据空间。打通多式联运数据堵点，促进一单制一箱制加速落地。深化物流数据在金融行业的应用。',tags:['数据共享','降本增效','数字化']});
    policies.push({id:'policy-008',title:'网络货运承运平台经营管理办法',agency:'交通运输部、国家税务总局',date:'2026-02-01',category:'数字化转型',summary:'明确平台以承运人身份整合资源并承担责任',content:'办法明确平台是以承运人身份整合资源、委托实际承运人完成运输并承担责任的经营活动。强化平台资质审核、安全管控及税务合规要求。建立省级网络货运信息监测系统，实现与平台有效对接。推行总对总数据共享。延长涉税资料保存期限至10年。',tags:['网络货运','平台监管','税务合规']});
    policies.push({id:'policy-009',title:'国务院关于修改快递暂行条例的决定',agency:'国务院',date:'2025-06-01',category:'绿色物流',summary:'新增快递包装章节，推进快递包装绿色化、减量化、可循环',content:'决定新增第六章快递包装，明确构建绿色节能快递服务体系。推进快递包装绿色化、减量化、可循环，鼓励使用可降解环保材料。要求快递企业制定包装操作规范、回收利用管理制度。强制要求快递包装符合国家标准，违者最高罚款50万元。',tags:['快递包装','绿色环保','条例修改']});
    policies.push({id:'policy-010',title:'现代物流标准化重点工作计划2025-2027年',agency:'市场监管总局、国家发展改革委等6部门',date:'2025-12-30',category:'绿色物流',summary:'部署5大板块、101项国家标准研制任务',content:'计划部署5大板块、101项国家标准研制任务。重点领域包括：物流基础设施功能提升、装备器具创新、数据开放互联、服务运作提质增效、行业基础夯实提升。旨在完善物流标准体系，提升物流服务质量和效率。',tags:['物流标准化','国家标准','三年计划']});
    policies.push({id:'policy-011',title:'加快培育交通物流领军企业提升产业链供应链服务保障能力行动方案',agency:'交通运输部等8部门',date:'2026-01-28',category:'供应链安全',summary:'到2030年，打造100家左右综合物流集成商',content:'方案提出，到2030年，力争打造100家左右综合物流集成商，其中10家以上具有全球竞争力。完善交通物流服务网络，支持企业规模化网络化发展。提升一体化服务水平，发展多式联运一单制一箱制。深化与产业融合发展，加速数智化赋能，增强安全韧性。',tags:['领军企业','供应链','多式联运']});
    policies.push({id:'policy-012',title:'2026年中央一号文件农村物流专项部署',agency:'中共中央、国务院',date:'2026-02-03',category:'农村物流',summary:'支持农村寄递物流设施共建共享，推动农村客货邮融合发展',content:'中共中央国务院关于锚定农业农村现代化扎实推进乡村全面振兴的意见提出：支持农村寄递物流设施共建共享，纳入农村基础设施建设范畴。推动农村客货邮融合发展，发展客运+货运+邮政一体化运营模式。推行共同配送，优化县乡村三级物流网络。深化快递进村，提升农村快递服务质效。加强产地预冷、仓储保鲜、分拣加工等设施建设。',tags:['农村物流','快递进村','乡村振兴']});
    policies.push({id:'policy-013',title:'2026年仓储物流领域政府专项债申报指南',agency:'财政部、国家发展改革委',date:'2026-02-04',category:'基础设施投资',summary:'仓储物流为重点支持行业，专项债资金最高可达总投资80%',content:'2026年地方政府专项债券发行额度预计达4.8万亿元，仓储物流为重点支持行业。核心支持方向包括：国家物流枢纽建设与升级、智慧物流与数字化供应链平台、城乡冷链物流设施、应急与绿色物流项目。大型物流基建项目可争取专项债资金，最高可达总投资80%。',tags:['专项债','基础设施','投资']});
    policies.push({id:'policy-014',title:'山东省药品现代物流实施意见',agency:'山东省药品监督管理局',date:'2026-02-01',category:'药品物流',summary:'新开办药品批发企业需符合现代物流要求',content:'意见规定新开办药品批发企业及开展受托储存、运输药品业务的企业适用本意见。鼓励现有企业通过设施设备升级、资源整合逐步达到现代物流要求。企业需建立覆盖质量管理、仓储管理、物流管理、信息管理的质量管理体系。物流管理机构需配备2名以上物流管理人员及1名以上计算机管理人员。仓库储存作业区整体建筑面积不少于10000平方米或容积不少于50000立方米。',tags:['药品物流','现代物流','地方政策']});

    document.addEventListener('DOMContentLoaded', function() {
        var urlParams = new URLSearchParams(window.location.search);
        var policyId = urlParams.get('id');
        if (policyId) {
            loadPolicyDetail(policyId);
        } else {
            document.getElementById('policyDetail').innerHTML = '<div>未找到政策信息</div>';
        }
    });

    function loadPolicyDetail(id) {
        var policy = null;
        for (var i = 0; i < policies.length; i++) {
            if (policies[i].id === id) { policy = policies[i]; break; }
        }
        if (!policy) {
            document.getElementById('policyDetail').innerHTML = '<div>政策不存在</div>';
            return;
        }
        document.title = policy.title + ' - 六点半物流资讯';
        var html = '<h1>' + policy.title + '</h1>';
        html += '<div class="policy-meta"><span>发布机构：' + policy.agency + '</span><span>生效时间：' + policy.date + '</span><span>分类：' + policy.category + '</span></div>';
        html += '<div class="policy-content"><p>' + policy.content + '</p></div>';
        html += '<div class="policy-tags">';
        for (var j = 0; j < policy.tags.length; j++) {
            html += '<span class="policy-tag">' + policy.tags[j] + '</span>';
        }
        html += '</div>';
        document.getElementById('policyDetail').innerHTML = html;
        loadRelatedPolicies(policy);
    }

    function loadRelatedPolicies(currentPolicy) {
        var related = [];
        for (var i = 0; i < policies.length; i++) {
            if (policies[i].id !== currentPolicy.id && policies[i].category === currentPolicy.category) {
                related.push(policies[i]);
                if (related.length >= 3) break;
            }
        }
        if (related.length === 0) {
            document.getElementById('relatedPolicies').style.display = 'none';
            return;
        }
        var html = '';
        for (var i = 0; i < related.length; i++) {
            html += '<div class="related-item" onclick="viewPolicy(\'' + related[i].id + '\')">';
            html += '<h4>' + related[i].title + '</h4>';
            html += '<p>' + related[i].date + ' | ' + related[i].agency + '</p>';
            html += '</div>';
        }
        document.getElementById('relatedList').innerHTML = html;
    }

    function viewPolicy(id) {
        window.location.href = 'policy-detail.html?id=' + id;
    }
    </script>
</body>
</html>
