<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="2020年以来中国物流行业重要政策法规汇编">
    <title>物流政策法规汇编 - 六点半物流资讯</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .policy-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .policy-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            color: white;
        }
        .policy-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .policy-header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        .policy-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #667eea;
            color: white;
        }
        .policy-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .policy-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid #667eea;
        }
        .policy-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(102,126,234,0.15);
        }
        .policy-card h3 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 12px;
        }
        .policy-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
            font-size: 0.9rem;
            color: #666;
        }
        .policy-summary {
            color: #555;
            line-height: 1.6;
        }
        .policy-tags {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .policy-tag {
            display: inline-block;
            padding: 4px 12px;
            background: #f0f0ff;
            color: #667eea;
            border-radius: 15px;
            font-size: 0.8rem;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background: #5a6fd6;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1><a href="index.html">六点半物流资讯</a></h1>
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="index.html">首页</a></li>
                    <li><a href="category.html?cat=快递">快递</a></li>
                    <li><a href="category.html?cat=仓储">仓储</a></li>
                    <li><a href="category.html?cat=运输">运输</a></li>
                    <li><a href="category.html?cat=供应链">供应链</a></li>
                    <li><a href="category.html?cat=政策">政策</a></li>
                    <li><a href="policy.html" class="active">政策法规汇编</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container policy-container">
            <a href="index.html" class="back-btn">← 返回首页</a>
            
            <div class="policy-header">
                <h1>2020年以来物流政策法规汇编</h1>
                <p>整理时间：2026年6月15日 | 共收录14项重要政策</p>
            </div>

            <div class="policy-filters">
                <button class="filter-btn active" onclick="filterPolicies('all')">全部政策</button>
                <button class="filter-btn" onclick="filterPolicies('综合物流规划')">综合物流规划</button>
                <button class="filter-btn" onclick="filterPolicies('冷链物流')">冷链物流</button>
                <button class="filter-btn" onclick="filterPolicies('数字化转型')">数字化转型</button>
                <button class="filter-btn" onclick="filterPolicies('绿色物流')">绿色物流</button>
                <button class="filter-btn" onclick="filterPolicies('供应链安全')">供应链安全</button>
                <button class="filter-btn" onclick="filterPolicies('农村物流')">农村物流</button>
                <button class="filter-btn" onclick="filterPolicies('基础设施投资')">基础设施投资</button>
            </div>

            <div class="policy-list" id="policyList">
                <!-- 动态加载政策列表 -->
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>关于我们</h4>
                    <p>国内物流新闻门户，提供最新的物流行业资讯和深度分析。</p>
                </div>
                <div class="footer-section">
                    <h4>快速链接</h4>
                    <ul>
                        <li><a href="index.html">首页</a></li>
                        <li><a href="category.html?cat=快递">快递新闻</a></li>
                        <li><a href="policy.html">政策法规汇编</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>联系方式</h4>
                    <p>邮箱：contact@logistics-news.com</p>
                    <p>电话：400-123-4567</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 六点半物流资讯. 版权所有.</p>
            </div>
        </div>
    </footer>

    <script src="js/policies.js"></script>
    <script>
        let allPolicies = [];
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', function() {
            allPolicies = policies;
            renderPolicies(allPolicies);
        });

        function filterPolicies(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.includes(category) || (category === 'all' && btn.textContent.includes('全部')));
            });
            
            const filtered = category === 'all' ? allPolicies : allPolicies.filter(p => p.category === category);
            renderPolicies(filtered);
        }

        function renderPolicies(policies) {
            const container = document.getElementById('policyList');
            if (!policies.length) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#666">暂无相关政策</div>';
                return;
            }

            container.innerHTML = policies.map(policy => `
                <div class="policy-card" onclick="viewPolicy('${policy.id}')">
                    <h3>${policy.title}</h3>
                    <div class="policy-meta">
                        <span>发布机构：${policy.agency}</span>
                        <span>生效时间：${policy.date}</span>
                        <span>分类：${policy.category}</span>
                    </div>
                    <div class="policy-summary">${policy.summary}</div>
                    <div class="policy-tags">
                        ${policy.tags.map(tag => `<span class="policy-tag">${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function viewPolicy(id) {
            window.location.href = 'policy-detail.html?id=' + id;
        }
    </script>
</body>
</html>
